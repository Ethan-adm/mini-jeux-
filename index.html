<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mes Mini-Jeux</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #0b0f19; color: #ffffff; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; text-align: center; }
        #hub { background-color: #16213e; padding: 30px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); width: 90%; max-width: 450px; }
        .games-grid { display: flex; flex-direction: column; gap: 15px; margin-top: 20px; }
        
        /* Le lien vers ton dossier undercover */
        .game-card { background-color: #0f3460; border: 2px solid #e94560; border-radius: 10px; padding: 15px; cursor: pointer; transition: 0.3s; color: white; text-decoration: none; display: block;}
        .game-card:hover { background-color: #e94560; }
        .disabled { border-color: #333; background-color: #222; cursor: not-allowed; opacity: 0.7; pointer-events: none;}
    </style>
</head>
<body>
    <div id="hub">
        <h1>🎮 Mes Mini-Jeux</h1>
        <p>Choisis un jeu pour commencer :</p>
        <div class="games-grid">
            <a href="/mini-jeux-/undercover/index.html" class="game-card">
                <h2>🕵️‍♂️ Undercover</h2>
                <p>Démasquez les intrus !</p>
            </a>
            
            <a href="#" class="game-card disabled">
                <h2>⏳ Prochainement...</h2>
                <p>Un nouveau jeu arrive</p>
            </a>
        </div>
    </div>
</body>
</html>
