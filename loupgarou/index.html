<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loup-Garou - Multijoueur</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #0b0f19; color: #ffffff; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; text-align: center; }
        #app { background-color: #16213e; padding: 30px; border-radius: 15px; box-shadow: 0 10px 40px rgba(0,0,0,0.8); width: 90%; max-width: 450px; margin: 20px auto; position: relative; overflow: hidden;}
        .screen { display: none; }
        .screen.active { display: block; animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .input-zone { display: flex; flex-direction: column; gap: 15px; margin-top: 30px;}
        input[type="text"], input[type="number"] { padding: 15px; border-radius: 8px; border: none; font-size: 16px; background-color: #2a3a5a; color: white; text-align: center; outline: none; transition: 0.3s;}
        input[type="text"]:focus { box-shadow: 0 0 0 2px #e94560; }
        button { background-color: #e94560; color: white; border: none; padding: 15px; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; font-size: 16px; transition: 0.2s; margin-top: 10px;}
        button:hover { background-color: #ff4a6a; transform: translateY(-2px); }
        .kick-btn { background: #ff4a6a; color: white; border: none; padding: 5px 10px; border-radius: 5px; cursor: pointer; font-size: 12px; margin-left: 10px; }
        .back-btn { background-color: transparent; border: 1px solid rgba(255,255,255,0.3); width: auto; padding: 8px 15px; font-size: 14px; margin-bottom: 20px;}
        h1, h2, h3 { margin-top: 0; }
        .highlight { color: #e94560; font-size: 1.5em; letter-spacing: 2px;}
        ul { list-style-type: none; padding: 0; margin-top: 15px;}
        li { background: #0f3460; margin: 8px 0; padding: 15px; border-radius: 8px; font-weight: bold; border-left: 4px solid #e94560; text-align: left; display: flex; align-items: center; justify-content: space-between;}
        .settings-box-container { background: #0f3460; padding: 20px; border-radius: 12px; margin-top: 25px; text-align: left; border: 2px solid #e94560;}
        .settings-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; font-size: 14px;}
        .custom-select { padding: 10px; border-radius: 8px; background: #2a3a5a; color: white; border: none; font-size: 14px; width: 55%;}
        .small-input { width: 60px !important; padding: 10px !important; border-radius: 8px; background: #2a3a5a; color: white; border: none; text-align: center; font-weight: bold;}
        .role-label { display: flex; align-items: center; gap: 10px; font-size: 15px; background: #16213e; padding: 10px; border-radius: 8px; width: calc(100% - 20px); cursor: pointer; margin-bottom: 5px;}
        .role-card { background: #0f3460; border: 3px dashed #e94560; border-radius: 15px; padding: 40px 20px; margin-top: 20px; cursor: pointer; user-select: none; display: flex; flex-direction: column; align-items: center; min-height: 100px;}
        #endgame-screen { background-color: #ffd700; color: #16213e; }
    </style>
</head>
<body>
    <div id="app">
        <!-- ECRAN DE CONNEXION -->
        <div id="login-screen" class="screen active">
            <button class="back-btn" onclick="window.location.href='../index.html'">⬅ Retour au Hub</button>
            <h1>🐺 Loup-Garou</h1>
            <p>Multijoueur en direct</p>
            <div class="input-zone">
                <input type="text" id="player-name" placeholder="Choisis ton pseudo" maxlength="15">
                <input type="text" id="room-code" placeholder="Code du salon" maxlength="6">
                <button id="join-btn">Rejoindre la partie</button>
            </div>
        </div>

        <!-- ECRAN LOBBY -->
        <div id="lobby-screen" class="screen">
            <h2>Salon : <span id="display-room-code" class="highlight"></span></h2>
            <p>Joueurs connectés : <span id="player-count">0</span></p>
            <ul id="player-list"></ul>

            <div id="admin-panel" class="settings-box-container" style="display: none;">
                <h3 style="margin-top: 0;">👑 Panneau Admin</h3>
                <div class="settings-row">
                    <label>Mode :</label>
                    <select id="game-mode" class="custom-select">
                        <option value="auto">🤖 Narrateur Auto</option>
                        <option value="humain">🗣️ Narrateur Humain</option>
                    </select>
                </div>

                <!-- Sélection du narrateur (si humain) -->
                <div id="narrator-select-row" class="settings-row" style="display: none;">
                    <label>Le Narrateur :</label>
                    <select id="narrator-id" class="custom-select"></select>
                </div>

                <div class="settings-row">
                    <label>🐺 Loups-Garous :</label>
                    <input type="number" id="wolf-count" value="1" min="1" max="5" class="small-input">
                </div>

                <div style="margin-top: 15px;">
                    <label class="role-label"><input type="checkbox" id="role-voyante" checked> 👁️ Voyante</label>
                    <label class="role-label"><input type="checkbox" id="role-sorciere" checked> 🧙‍♀️ Sorcière</label>
                    <label class="role-label"><input type="checkbox" id="role-chasseur" checked> 🔫 Chasseur</label>
                    <label class="role-label"><input type="checkbox" id="reveal-roles-death" checked> 🪦 Révéler les rôles</label>
                </div>

                <button id="start-game-btn">Distribuer les rôles !</button>
            </div>
        </div>

        <!-- ECRAN DE JEU -->
        <div id="game-screen" class="screen" style="position: relative; padding-bottom: 80px;">
            <div id="narrator-badge" style="display:none; background:#ffbc00; color:black; padding:5px; border-radius:5px; font-weight:bold; margin-bottom:10px;">🗣️ TU ES LE NARRATEUR</div>
            <div id="role-reveal-zone">
                <h2>Ton rôle secret est...</h2>
                <div class="role-card" id="role-card">
                    <p id="role-instruction" style="color:#888;">Reste appuyé ici pour voir</p>
                    <h1 id="my-role-display" style="display:none; color: #e94560; font-size: 2em; margin: 0;">???</h1>
                </div>
            </div>

            <!-- Barre de contrôle Admin (Mode Auto) -->
            <div id="admin-auto-bar" style="display: none; position: fixed; bottom: 0; left: 0; right: 0; background: #16213e; padding: 15px; border-top: 2px solid #e94560; justify-content: space-between; align-items: center;">
                <span id="vote-progress" style="font-size: 0.9em; color: #ffbc00;">0 vote(s)</span>
                <button id="btn-next-phase" style="width: auto; margin: 0; padding: 10px 20px;">Suivant ➡️</button>
            </div>
        </div>

        <!-- ECRAN DE MORT -->
        <div id="dead-screen" class="screen">
            <h1 style="font-size: 3em;">💀 TU ES MORT</h1>
            <p>Observe la suite en silence.</p>
            <button onclick="location.reload()">Quitter</button>
        </div>
    </div>
    <script type="module" src="script.js?v=100"></script>
</body>
</html>
